# ENVIRONMENT
# =================================================
[env]
TERM = "xterm-256color"

# WINDOW 
# =================================================
[window]
opacity = 0.95
title = "(✖╭╮✖)"

[window.padding]
x = 0
y = 0

# FONT
# =================================================
[font]
size = 16.0

[font.normal]
family = "SpaceMono Nerd Font"
style = "Regular"

[font.bold]
family = "SpaceMono Nerd Font"
style = "Bold"

[font.italic]
family = "SpaceMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "SpaceMono Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

# HISTORY
# =================================================
[scrolling]
history = 5000
